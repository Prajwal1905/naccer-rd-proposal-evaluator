
services:
  backend:
    build: ./backend
    container_name: naccer-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: naccer-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped